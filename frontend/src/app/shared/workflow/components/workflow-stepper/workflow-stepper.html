<nav class="overflow-x-auto pb-2">
  <ol class="flex min-w-max gap-2 md:gap-3">
    @for (step of visibleSteps(); track step.stage) {
      <li>
        <a
          [routerLink]="step.path"
          routerLinkActive="step-active"
          class="step-link flex items-center gap-2 rounded-xl border border-sky-200 bg-white px-3 py-2 text-xs font-semibold text-sky-900 transition hover:border-sky-400 hover:bg-sky-50 md:text-sm"
          [class.step-current]="activeStep() === step.stage"
        >
          <i [class]="step.icon + ' text-sky-500'"></i>
          <span class="hidden sm:inline">{{ step.label }}</span>
        </a>
      </li>
    }
  </ol>
</nav>
