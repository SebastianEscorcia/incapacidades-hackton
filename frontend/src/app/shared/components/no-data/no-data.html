<div class="flex flex-col items-center justify-center py-16 px-4">
    <div class="relative mb-6">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-100 to-purple-100 rounded-full blur-xl opacity-70">
        </div>
        <div class="relative bg-white rounded-full p-8 shadow-lg border border-gray-100">
            <i [class]="'pi ' + icon() + ' text-6xl text-gray-400'"></i>
        </div>
    </div>

    <h3 class="text-2xl font-semibold text-gray-800 mb-3 text-center">
        {{ title() }}
    </h3>

    <p class="text-gray-500 text-center max-w-md mb-6 leading-relaxed">
        {{ message() }}
    </p>

    <p-button *ngIf="showButton()" [label]="buttonLabel()" [icon]="'pi ' + buttonIcon()" (onClick)="handleAction()"
        styleClass="p-button-rounded"
        [style]="{'background': 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', 'border': 'none'}" />

    <div class="mt-8 flex gap-2">
        <span class="w-2 h-2 bg-gray-300 rounded-full"></span>
        <span class="w-2 h-2 bg-gray-300 rounded-full"></span>
        <span class="w-2 h-2 bg-gray-300 rounded-full"></span>
    </div>
</div>
