<auth-shell
  [title]="'pages.recoverPassword' | translate"
  [subtitle]="'pages.recoverPasswordDescription' | translate"
  icon="pi pi-lock"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <div class="auth-field">
      <p-floatlabel>
        <input id="code" type="text" pInputText formControlName="code" class="w-full" />
        <label for="code">{{ 'auth.recoveryCode' | translate }}</label>
      </p-floatlabel>
      @if (form.controls.code.invalid && form.controls.code.touched) {
        <small class="auth-error">{{ 'auth.recoveryCodeRequired' | translate }}</small>
      }
    </div>
    <div class="auth-field">
      <p-floatlabel>
        <p-password inputId="password" formControlName="password" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
        <label for="password">{{ 'auth.password' | translate }}</label>
      </p-floatlabel>
    </div>
    <div class="auth-field">
      <p-floatlabel>
        <p-password inputId="confirmPassword" formControlName="confirmPassword" [feedback]="false" [toggleMask]="true" styleClass="w-full" inputStyleClass="w-full" />
        <label for="confirmPassword">{{ 'auth.confirmPassword' | translate }}</label>
      </p-floatlabel>
    </div>
    <p-button type="submit" [disabled]="form.invalid" styleClass="auth-submit w-full" [label]="'auth.recoverAction' | translate" icon="pi pi-check" />
  </form>
  <div class="auth-links">
    <a routerLink="/auth/login">{{ 'auth.backToLogin' | translate }}</a>
    <a routerLink="/public">{{ 'auth.backToStart' | translate }}</a>
  </div>
</auth-shell>
