<auth-shell
  [title]="'pages.forgotPassword' | translate"
  [subtitle]="'pages.forgotPasswordDescription' | translate"
  icon="pi pi-envelope"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <div class="auth-field">
      <p-floatlabel>
        <input id="email" type="email" pInputText formControlName="email" class="w-full" />
        <label for="email">{{ 'auth.email' | translate }}</label>
      </p-floatlabel>
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <small class="auth-error">{{ 'auth.emailRequired' | translate }}</small>
      }
    </div>
    <p-button type="submit" [disabled]="form.invalid" styleClass="auth-submit w-full" [label]="'auth.forgotAction' | translate" icon="pi pi-send" />
  </form>
  <div class="auth-links">
    <a routerLink="/auth/login">{{ 'auth.backToLogin' | translate }}</a>
    <a routerLink="/auth/recover-password">{{ 'auth.alreadyHaveCode' | translate }}</a>
    <a routerLink="/public">{{ 'auth.backToStart' | translate }}</a>
  </div>
</auth-shell>
